name = "fourth-and-inches-backend"
main = "src/index.ts"
compatibility_date = "2024-05-02"

[vars]
SPORTSDATA_API_KEY = "ee36220d6dbc4fcbb4184020f38cffdc"

[[d1_databases]]
binding = "DB"
database_name = "inches_db"
database_id = "712cd98c-9d64-48f4-ad37-641a7a8d8fe4"

[triggers]
# Hourly during test/preview to avoid hammering the SportsData API.
# Restore "* * * * *" (or a live-window schedule) for production.
crons = ["0 * * * *"]

[durable_objects]
bindings = [
  { name = "LEAGUE_ROOM", class_name = "LeagueRoom" },
  { name = "DRAFT_ROOM", class_name = "DraftRoom" }
]

[[migrations]]
tag = "v2"
new_classes = ["LeagueRoom"]

[[migrations]]
tag = "v3"
new_classes = ["DraftRoom"]
